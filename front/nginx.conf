server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket proxy — must come before the SPA catch-all.
    # Use Docker's embedded DNS resolver (127.0.0.11) so the upstream
    # is resolved at request time, not at Nginx startup. This prevents
    # Nginx from crashing when the backend container isn't yet ready.
    location /ws {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream http://backend:3001;
        proxy_pass $backend_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Keep long-lived WS connections alive
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
