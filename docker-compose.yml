services:
  backend:
    image: "${DOCKER_IMAGE_BACKEND:-roodev0208/flow-backend:latest}"
    restart: unless-stopped
    environment:
      PORT: "3001"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    networks:
      - app

  frontend:
    image: "${DOCKER_IMAGE_FRONTEND:-roodev0208/flow-frontend:latest}"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
