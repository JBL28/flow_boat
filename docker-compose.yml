services:
  backend:
    image: "${DOCKER_IMAGE_BACKEND:-flow-backend:latest}"
    build: ./back
    restart: unless-stopped
    environment:
      PORT: "3001"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-}"
    networks:
      - app

  frontend:
    image: "${DOCKER_IMAGE_FRONTEND:-flow-frontend:latest}"
    build:
      context: ./front
      args:
        VITE_WS_URL: "${VITE_WS_URL:-}"
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - app

networks:
  app:
    driver: bridge
